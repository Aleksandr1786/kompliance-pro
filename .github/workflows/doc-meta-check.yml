# ══════════════════════════════════════════════════════════════════
#  doc-meta-check.yml — Уровень 1 автоматизации доказательной базы
# ══════════════════════════════════════════════════════════════════
#
# ЗАЧЕМ: 12.07.2026 обнаружено, что правка текста генератора из-за
# изменения закона (gen_pd.js) была внесена без соответствующей
# правки doc-meta.js (version/npa) — фича «почему изменился документ»
# из-за этого ни разу не показала подписчикам верную причину. Человеческий
# фактор — забыли. Этот workflow не даёт так забыть молча: если в коммите
# меняется хотя бы один gen_*.js, а doc-meta.js — нет, шлёт предупреждение.
#
# НАМЕРЕННО НЕ БЛОКИРУЕТ коммит/пуш (не делает job failed) — не каждая
# правка генератора вызвана изменением закона (бывают структурные фиксы,
# как сегодняшняя история с разделами документов), а один и тот же
# gen_*.js часто трогают в рамках одной сессии по совсем не-НПА причине.
# Жёсткая блокировка при высокой частоте правок быстро начнёт раздражать
# и её станут обходить (--no-verify) — тогда чек бесполезен. Вместо
# этого — заметное предупреждение в Actions + Telegram, окончательное
# решение «нужен ли был doc-meta.js» остаётся за Александром/Claude.
#
# ПУТЬ К УРОВНЮ 3: когда появится собственный сервер, эта же логика
# (git diff → есть ли gen_*.js без doc-meta.js) переедет туда как один
# из плановых чеков, и сервер сможет не просто предупреждать, а сверяться
# с реальным NPA_WATCHLIST и решать, действительно ли нужен version bump.
# Секреты TG_TOKEN/TG_CHAT_ID здесь — те же, что уже используются в самом
# приложении для Telegram-уведомлений о НПА (Настройки → Telegram),
# переиспользуем канал, не заводим отдельный.

name: Проверка doc-meta.js при правке генераторов

on:
  push:
    branches: [ main, master ]

jobs:
  check-doc-meta-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (с историей для сравнения коммитов)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Определяем изменённые файлы в этом пуше
        id: diff
        run: |
          # HEAD~1 может не существовать для самого первого коммита в репозитории —
          # тогда просто пропускаем проверку (не с чем сравнивать).
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "first_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "first_commit=false" >> "$GITHUB_OUTPUT"

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Изменённые файлы:"
          echo "$CHANGED"

          # gen_*.js в любом месте репозитория (сейчас лежат в корне,
          # но не завязываемся на точный путь на случай будущего рефакторинга)
          GEN_CHANGED=$(echo "$CHANGED" | grep -E '(^|/)gen_[A-Za-z0-9_]+\.js$' || true)
          META_CHANGED=$(echo "$CHANGED" | grep -E '(^|/)doc-meta\.js$' || true)

          {
            echo "gen_changed<<EOF"
            echo "$GEN_CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$GEN_CHANGED" ] && [ -z "$META_CHANGED" ]; then
            echo "needs_warning=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_warning=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Предупреждение в логе Actions
        if: steps.diff.outputs.needs_warning == 'true'
        run: |
          echo "::warning::gen_*.js изменён без doc-meta.js в этом пуше — если правка вызвана изменением закона (НПА), version/npa нужно поднять вручную. Если это не связано с законом (структурный фикс, рефакторинг) — предупреждение можно игнорировать."
          echo "Изменённые generator-файлы без doc-meta.js:"
          echo "${{ steps.diff.outputs.gen_changed }}"

      - name: Уведомление в Telegram
        if: steps.diff.outputs.needs_warning == 'true'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "TG_TOKEN/TG_CHAT_ID не заданы в секретах репозитория — пропускаю Telegram, предупреждение осталось только в логе Actions."
            exit 0
          fi
          FILES="${{ steps.diff.outputs.gen_changed }}"
          TEXT="⚠️ КомплаенсПро: изменён генератор без doc-meta.js\n\nКоммит: ${{ github.sha }}\nАвтор: ${{ github.actor }}\nФайлы: ${FILES}\n\nЕсли правка вызвана изменением закона — поднимите version/npa в doc-meta.js. Если нет — можно игнорировать."
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode text="$(printf '%b' "$TEXT")" > /dev/null
